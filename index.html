<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Personal Power — Field Guide</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A companion and field guide to Tony Robbins' 30-part Personal Power program: per-day summaries, cleaned transcripts, distilled principles, and an action tracker." />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --theme-color: #b3431f;          /* warm ember accent */
      --content-max-width: 820px;
    }
    .markdown-section { max-width: var(--content-max-width); }
    .markdown-section h1 { font-size: 2rem; }
    .sidebar { font-size: 15px; }
    .sidebar-nav strong { color: #5a5a5a; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; }
    .markdown-section blockquote { border-left: 4px solid var(--theme-color); background: #faf4f1; }
    .app-name-link img, .app-name { font-weight: 700; }
    .markdown-section table { display: table; width: 100%; }
  </style>
</head>
<body>
  <div id="app">Loading the field guide…</div>
  <script>
    window.$docsify = {
      name: '⚡ Personal Power',
      repo: 'https://github.com/Halcykon/personal-power',
      homepage: 'README.md',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      relativePath: true,
      maxLevel: 4,
      search: {
        depth: 4,
        placeholder: 'Search the guide…',
        noData: 'No matches found.'
      }
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
